<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Wallfacer - Sophon Filter</title>
    <style>
        :root { 
            --bg-color: #020617; 
            --text-main: #e2e8f0; 
            --sophon-red: #ff4d4d; 
            --terminal-green: #4ade80; 
            --glow-green: 0 0 15px rgba(74, 222, 128, 0.4);
            --glow-red: 0 0 15px rgba(255, 77, 77, 0.5);
            
            /* ▼ 人格ごとのテーマカラー定義 ▼ */
            --color-historian: #60a5fa;   /* ブルー */
            --color-podcaster: #fbbf24;   /* アンバー */
            --color-child: #2dd4bf;       /* シアン */
            --color-synthesizer: #4ade80; /* グリーン */
        }

        body { 
            background-color: var(--bg-color); 
            background-image: 
                radial-gradient(1px 1px at 25% 35%, #fff, transparent),
                radial-gradient(1px 1px at 50% 70%, #fff, transparent),
                radial-gradient(2px 2px at 75% 20%, #cbd5e1, transparent),
                radial-gradient(2px 2px at 15% 85%, #94a3b8, transparent),
                linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(30, 41, 59, 0.5) 100%);
            background-attachment: fixed;
            color: var(--text-main); 
            font-family: 'Yu Mincho', 'Sawarabi Mincho', serif; 
            font-size: 18px; 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; 
        }

        #app { 
            width: 100%; max-width: 900px; 
            background: rgba(2, 6, 23, 0.85); 
            padding: 40px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(12px); box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            position: relative; z-index: 10;
        }

        .sophon-text { 
            font-family: sans-serif; color: var(--sophon-red); 
            letter-spacing: 4px; text-transform: uppercase; text-shadow: var(--glow-red);
            font-size: 1.5rem; margin-bottom: 30px;
        }

        .hidden { display: none !important; }

        #timer-display { 
            font-size: 100px; font-family: monospace; 
            color: var(--terminal-green); text-shadow: var(--glow-green); margin: 30px 0; 
        }

        .timer-alert { color: var(--sophon-red) !important; animation: blink 0.5s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.2; } }

        textarea, input[type="text"] { 
            width: 100%; background: rgba(0, 0, 0, 0.6); border: 1px solid #444; 
            color: white; padding: 20px; font-family: inherit; font-size: 1.1rem; 
            box-sizing: border-box; margin-bottom: 20px; border-radius: 8px;
        }

        button { 
            background: rgba(255, 255, 255, 0.08); color: white; border: 1px solid rgba(255, 255, 255, 0.3); 
            padding: 12px 24px; font-size: 1rem; cursor: pointer; border-radius: 6px; transition: 0.3s; 
            margin: 0 5px;
        }

        button:hover { background: white !important; color: #020617 !important; }

        #chat-log { 
            height: 350px; overflow-y: auto; text-align: left; 
            border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.4); 
            padding: 25px; margin-bottom: 20px; border-radius: 8px;
        }

        .msg-user { margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .msg-sophon { margin-bottom: 20px; padding-left: 15px; line-height: 1.6; transition: border-color 0.3s ease; }
        .msg-system { margin-bottom: 20px; color: #94a3b8; font-size: 0.9rem; text-align: center; font-family: monospace; }

        .glitch { animation: glitch 0.15s linear infinite; }
        @keyframes glitch { 0% { transform: translate(0) } 20% { transform: translate(-3px, 2px) } 40% { transform: translate(-3px, -2px) } 60% { transform: translate(3px, 2px) } 80% { transform: translate(3px, -2px) } 100% { transform: translate(0) } }
    </style>
</head>
<body>

<div id="app">
    <div id="phase-timer">
        <h2 class="sophon-text">Knowledge Extraction Phase</h2>
        <div id="timer-display">30:00</div>
        
        <div style="margin-bottom: 30px;">
            <p style="font-size: 1rem; color: #94a3b8; margin-bottom: 15px;">読書中のメモ（智子への武器）：</p>
            <textarea id="temp-memo" rows="4" placeholder="浮かんだ断片をここに書き留める..."></textarea>
        </div>

        <button onclick="startTimer()">読書を開始する</button>
        <button onclick="forceTimeout()" style="opacity: 0.3;">[SKIP]</button>
        <br><br>
        <button class="hidden" onclick="enterReflectionPhase()" id="finish-reading-btn" style="width: 100%; color: var(--sophon-red); border-color: var(--sophon-red);">読書を終え、面壁に入る</button>
    </div>

    <div id="phase-input" class="hidden">
        <h1 class="sophon-text glitch">智子の干渉：言語化せよ</h1>
        <p>得た知識を一文で確定させろ。</p>
        <input type="text" id="fragment-input" placeholder="一文を入力..." autocomplete="off">
        <button onclick="saveFragment()" style="width: 100%;">確定して再開</button>
    </div>

    <div id="phase-reflection" class="hidden">
        <h2 class="sophon-text" style="color: var(--text-main);">思考の統合</h2>
        <div id="fragments-list" style="text-align: left; color: #94a3b8; margin-bottom: 25px; border-left: 2px solid #334155; padding-left: 20px;"></div>
        <textarea id="reflection-input" rows="8" placeholder="独自の思想を構築せよ..."></textarea>
        
        <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 10px;">対話するパーソナリティを選択：</p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button onclick="startDialogue('historian')" style="border-color: var(--color-historian); color: var(--color-historian);">① 経済史学者</button>
            <button onclick="startDialogue('podcaster')" style="border-color: var(--color-podcaster); color: var(--color-podcaster);">② ポッドキャスター</button>
            <button onclick="startDialogue('child')" style="border-color: var(--color-child); color: var(--color-child);">③ 小学生</button>
            <button onclick="startDialogue('synthesizer')" style="border-color: var(--color-synthesizer); color: var(--color-synthesizer);">④ 知識の統合者</button>
        </div>
    </div>

    <div id="phase-dialogue" class="hidden">
        <h2 class="sophon-text">Sophon Protocol</h2>
        
        <div id="personality-switcher" style="margin-bottom: 15px; display: flex; gap: 8px; justify-content: center; font-size: 0.85rem; flex-wrap: wrap;">
            <button onclick="switchPersonality('historian')" id="btn-historian" style="padding: 6px 10px; border-color: var(--color-historian); color: var(--color-historian);">経済史学者</button>
            <button onclick="switchPersonality('podcaster')" id="btn-podcaster" style="padding: 6px 10px; border-color: var(--color-podcaster); color: var(--color-podcaster);">ポッドキャスター</button>
            <button onclick="switchPersonality('child')" id="btn-child" style="padding: 6px 10px; border-color: var(--color-child); color: var(--color-child);">小学生</button>
            <button onclick="switchPersonality('synthesizer')" id="btn-synthesizer" style="padding: 6px 10px; border-color: var(--color-synthesizer); color: var(--color-synthesizer);">知識の統合者</button>
        </div>

        <div id="chat-log"></div>
        <div style="display: flex; gap: 15px;">
            <input type="text" id="chat-input" placeholder="応答せよ (Enter)..." autocomplete="off" style="margin-bottom:0">
            <button onclick="sendMessage()">送信</button>
        </div>
        <div style="margin-top: 25px; display: flex; justify-content: space-around;">
            <button onclick="copyToClipboard()">📋 コピー</button>
            <button onclick="exportToObsidian()">💾 Obsidian保存</button>
            <button onclick="resetToTimer()" style="color: var(--sophon-red);">⏱️ タイマーへ戻る</button>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
